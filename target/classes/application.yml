server:
  port: 8085

spring:
  application:
    name: vehicle-rental-exam-jee
  datasource:
    url: jdbc:h2:mem:vehicle_rental_db
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  api-docs:
    path: /v3/api-docs

app:
  jwt:
    secret: 012345678901234567890123456789012345678901234567890123456789
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:4200
